<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlucoTrack | จัดการเบาหวาน</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3004/3004458.png">

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0fdfa; /* สีพื้นหลังเขียวอมฟ้าอ่อนๆ สบายตา */ }
        .tab-active { color: #0d9488; border-bottom: 3px solid #0d9488; font-weight: 600; }
        .tab-inactive { color: #94a3b8; }
        .hidden-view { display: none; }
    </style>
</head>
<body class="text-gray-800 pb-20">

    <div id="splashScreen" class="fixed inset-0 bg-gradient-to-b from-teal-500 to-teal-700 z-[100] flex flex-col justify-center items-center text-white transition-opacity duration-500">
        <div class="bg-white p-4 rounded-full shadow-lg mb-6 animate-bounce">
            <i class="fa-solid fa-droplet text-5xl text-teal-500"></i>
        </div>
        <h1 class="text-3xl font-bold mb-2 tracking-wide">GlucoTrack</h1>
        <p class="text-teal-100 mb-10 text-sm">ระบบจัดการข้อมูลระดับน้ำตาลในเลือด</p>
        
        <div class="flex flex-col items-center">
            <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4"></i>
            <span id="splashStatus" class="text-sm font-medium bg-teal-800/30 px-4 py-2 rounded-full backdrop-blur-sm">กำลังเชื่อมต่อฐานข้อมูล...</span>
        </div>
    </div>
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-teal-600"><i class="fa-solid fa-droplet text-teal-500"></i> GlucoTrack</h1>
            <div id="exportButtons" class="hidden">
                <button class="text-xs bg-red-100 text-red-600 px-3 py-2 rounded-lg mr-2 font-medium"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                <button class="text-xs bg-green-100 text-green-700 px-3 py-2 rounded-lg font-medium"><i class="fa-solid fa-file-excel"></i> Excel</button>
            </div>
        </div>
        
        <div class="flex justify-around bg-white border-b border-gray-100 max-w-3xl mx-auto">
            <button onclick="switchTab('form')" id="tab-form" class="tab-active flex-1 py-3 text-center transition"><i class="fa-solid fa-pen-to-square"></i> บันทึก</button>
            <button onclick="switchTab('history')" id="tab-history" class="tab-inactive flex-1 py-3 text-center transition"><i class="fa-solid fa-list-ul"></i> ประวัติ</button>
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-inactive flex-1 py-3 text-center transition"><i class="fa-solid fa-chart-line"></i> สถิติ</button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 mt-2 flex flex-col min-h-[80vh]">
        
        <div class="flex-grow">
            <section id="view-form">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-teal-50">
                    <form id="recordForm" class="space-y-5">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">วันที่วัด <span class="text-red-500">*</span></label>
                                <input type="date" id="recordDate" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-teal-400 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">เวลาที่วัด <span class="text-red-500">*</span></label>
                                <input type="time" id="recordTime" required class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-teal-400 outline-none transition">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">ระดับน้ำตาล (mg/dL) <span class="text-red-500">*</span></label>
                            <input type="number" id="glucoseLevel" required placeholder="เช่น 105" inputmode="numeric" class="w-full border border-gray-200 rounded-xl p-3 text-xl font-semibold text-teal-700 focus:ring-2 focus:ring-teal-400 outline-none transition">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">ช่วงเวลาที่วัด <span class="text-red-500">*</span></label>
                                <div class="flex gap-2">
                                    <select id="measurementType" required class="flex-1 border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-teal-400 outline-none bg-white">
                                        <option value="">เลือกช่วงเวลา...</option>
                                    </select>
                                    <button type="button" onclick="addNewOption('MeasurementType')" class="bg-teal-50 text-teal-600 border border-teal-200 px-4 rounded-xl hover:bg-teal-100 transition shadow-sm" title="เพิ่มตัวเลือก">
                                        <i class="fa-solid fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-600 mb-1">บริบทมื้ออาหาร</label>
                                <div class="flex gap-2">
                                    <select id="mealContext" class="flex-1 border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-teal-400 outline-none bg-white">
                                        <option value="-">ไม่ระบุ</option>
                                    </select>
                                    <button type="button" onclick="addNewOption('MealContext')" class="bg-teal-50 text-teal-600 border border-teal-200 px-4 rounded-xl hover:bg-teal-100 transition shadow-sm" title="เพิ่มตัวเลือก">
                                        <i class="fa-solid fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">หมายเหตุ / อาการ</label>
                            <textarea id="notes" rows="2" placeholder="เช่น รู้สึกหน้ามืด, ทานของหวานเยอะ" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-teal-400 outline-none transition"></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">อัพโหลดรูปภาพ (ถ้ามี)</label>
                            <input type="file" id="imageInput" accept="image/*" class="w-full border border-gray-200 rounded-xl p-2 bg-gray-50 text-sm">
                        </div>

                        <button type="submit" id="btnSubmit" class="w-full bg-teal-600 text-white font-semibold py-4 rounded-xl shadow-lg shadow-teal-200 hover:bg-teal-700 transition flex justify-center items-center gap-2 text-lg">
                            <i class="fa-solid fa-check-circle"></i> บันทึกข้อมูล
                        </button>
                    </form>
                </div>
            </section>

            <section id="view-history" class="hidden-view">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-teal-50">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4">ข้อมูลย้อนหลัง</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm" id="historyTable">
                            <thead class="bg-teal-50 text-teal-800">
                                <tr>
                                    <th class="p-3 rounded-tl-lg">วันที่/เวลา</th>
                                    <th class="p-3">น้ำตาล</th>
                                    <th class="p-3">ช่วงเวลา</th>
                                    <th class="p-3">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-gray-100">
                                <tr><td colspan="4" class="text-center py-4 text-gray-500"><i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="view-dashboard" class="hidden-view">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-blue-100 text-center">
                        <p class="text-xs text-gray-500 mb-1">ค่าเฉลี่ย (7 วัน)</p>
                        <h3 class="text-2xl font-bold text-blue-600" id="avg7Days">--</h3>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-green-100 text-center">
                        <p class="text-xs text-gray-500 mb-1">ล่าสุด</p>
                        <h3 class="text-2xl font-bold text-green-600" id="latestValue">--</h3>
                    </div>
                </div>
                
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-teal-50">
                    <h2 class="text-lg font-semibold text-gray-700 mb-4">กราฟแนวโน้ม</h2>
                    <div class="relative h-64 w-full">
                        <canvas id="glucoseChart"></canvas>
                    </div>
                </div>
            </section>
        </div>

        <footer class="mt-12 mb-4 text-center">
            <div class="w-16 h-1 bg-gray-200 mx-auto rounded-full mb-4"></div>
            <p class="text-xs font-medium text-gray-400">
                &copy; 2026 | ผู้พัฒนา: <span class="text-teal-600">IMRON ADAM</span>
            </p>
        </footer>
        </main>

    <script src="app.js"></script>
</body>
</html>
