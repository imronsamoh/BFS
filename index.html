<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glucose Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png"> <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-semibold text-[#2c3e50]"><i class="fa-solid fa-droplet text-[#3498db]"></i> Glucose Dashboard</h1>
            <div>
                <button id="btnExportPDF" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm shadow hover:bg-red-600 transition"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                <button id="btnExportExcel" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm shadow hover:bg-green-700 transition"><i class="fa-solid fa-file-excel"></i> Excel</button>
            </div>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
            <h2 class="text-lg font-medium text-gray-700 mb-4">แนวโน้มระดับน้ำตาล 7 วันล่าสุด</h2>
            <div class="relative h-64 w-full">
                <canvas id="glucoseChart"></canvas>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-medium text-gray-700 mb-4">บันทึกข้อมูลใหม่</h2>
            <form id="recordForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">ระดับน้ำตาล (mg/dL)</label>
                        <input type="number" id="glucoseLevel" required class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-[#3498db] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">ภาพถ่ายเครื่องวัด (ไม่บังคับ)</label>
                        <input type="file" id="imageInput" accept="image/*" class="w-full border border-gray-300 rounded-lg p-2 text-sm">
                    </div>
                </div>
                <button type="submit" id="btnSubmit" class="w-full bg-[#2c3e50] text-white font-semibold py-3 rounded-lg shadow hover:bg-opacity-90 transition">
                    <i class="fa-solid fa-save"></i> บันทึกข้อมูล
                </button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
